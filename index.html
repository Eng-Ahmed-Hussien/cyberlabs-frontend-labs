<!doctype html>
<html lang="en">
  <head>
    <!-- Meta basics -->
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SEO -->
    <title>CyberLabs | Labs</title>
    <meta
      name="title"
      content="CyberLabs Platform | Cybersecurity Learning Gateway" />
    <meta
      name="description"
      content="CyberLabs Platform is a fast, secure, and scalable cybersecurity learning environment built with React, Node.js, Express, Prisma, and PostgreSQL. Developed by Ahmed Hussien & the CyberLabs team." />
    <meta name="author" content="Ahmed Hussien, CyberLabs Team" />
    <meta name="application-name" content="CyberLabs Platform" />
    <meta
      name="keywords"
      content="CyberLabs, Cybersecurity Learning, React, Node.js, Express, Prisma, PostgreSQL, Vercel, Ahmed Hussien, Fullstack Developer" />

    <!-- Open Graph / WhatsApp / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://digitopia-project.vercel.app/" />
    <meta
      property="og:title"
      content="CyberLabs Platform | Cybersecurity Learning Gateway" />
    <meta
      property="og:description"
      content="Explore CyberLabs Platform – a modern, secure, and scalable learning environment powered by React, Bootstrap, Node.js, Express, Prisma, PostgreSQL, and Vercel." />
    <meta
      property="og:image"
      content="https://digitopia-project.vercel.app/meta-image.jpg?v=2" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="CyberLabs" />

    <!-- Favicon -->
    <link rel="shortcut icon" href="/images/favIcon.svg" type="image/x-icon" />
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/images/favIcon.svg" />

    <style>
      /* Inline preloader styles to load immediately before CSS */
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 0.5s ease-out;
      }
      .preloader-img {
        width: 150px;
        height: auto;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { transform: scale(0.95); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(0.95); opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <!-- PRELOADER -->
    <div id="preloader">
      <!-- Trying both potential paths based on main platform standard -->
      <img src="/images/logo.png" onerror="this.src='/logo.png'" alt="CyberLabs Loading..." class="preloader-img" />
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root"></div>

    <script>
      // Tab visibility text and favicon change
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') {
          document.title = 'CyberLabs | Labs';
          const link = document.querySelector("link[rel*='icon']");
          if(link) link.setAttribute('href', '/images/favIcon.svg');
        } else {
          document.title = 'Come Back Please';
          const link = document.querySelector("link[rel*='icon']");
          if(link) link.setAttribute('href', '/images/favhand.png');
        }
      });

      // Remove preloader once React starts hydrating
      window.addEventListener('load', function() {
        const preloader = document.getElementById('preloader');
        if (preloader) {
          setTimeout(() => {
            preloader.style.opacity = '0';
            setTimeout(() => {
              preloader.style.display = 'none';
            }, 500);
          }, 500); // Small delay to ensure smooth transition
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
