<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberBank - Admin Login</title>
    <style>
      body { font-family: system-ui; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f3f4f6; margin: 0; }
      .login-box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
      input { w-full; padding: 8px; margin-bottom: 12px; width: 90%; border: 1px solid #ccc; border-radius: 4px; }
      button { background: #2563eb; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; }
      button:hover { background: #1d4ed8; }
      .error { color: red; font-size: 12px; display: none; margin-bottom: 10px;}
    </style>
  </head>
  <body>
    <div class="login-box">
      <h2 style="margin-top: 0; text-align: center">CyberBank Admin</h2>
      <p style="color: #666; font-size: 12px; text-align: center">
        Please login to access the dashboard.
      </p>
      <div class="error" id="errorMsg">Invalid credentials.</div>
      <input type="text" id="username" placeholder="Username" />
      <input type="password" id="password" placeholder="Password" />
      <button onclick="attemptLogin()">Login</button>
    </div>

    <script>
      function attemptLogin() {
        const user = document.getElementById('username').value;
        const error = document.getElementById('errorMsg');

        // Very naive simulation of SQLi for the mock
        if (user.includes("' OR '1'='1") || user.includes("' OR 1=1")) {
          document.body.innerHTML =
            '<div style="text-align:center; padding: 2rem; background: #dcfce3; color: #166534; border-radius:8px;"><h2>Access Granted!</h2><p>Welcome to the admin dashboard.</p><p>Flag: <code>CYBER{SQLI_Byp4ss_M0ck}</code></p></div>';
        } else {
          error.style.display = 'block';
        }
      }
    </script>
  </body>
</html>
